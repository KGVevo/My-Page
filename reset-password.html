<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
            font-family: sans-serif;
            color: #333;
            background-image: url('fondo.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .auth-container {
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            background-color: #dba9d7;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .message {
            font-size: 24px;
            margin-bottom: 40px; 
            color: #ac0000;
            font-weight: 700;
        }

        .password-input {
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid #f5b9b9;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 15px;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .password-input:focus {
            border-color: #f581ff;
            box-shadow: 0 0 8px rgba(108, 41, 139, 0.5);
        }

        .confirm-button {
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            background-color: hsl(303, 100%, 71%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s ease;
            margin-top: 10px; 
        }

        .confirm-button:hover {
            background-color: #3b0032;
        }

        #resetMessage {
            margin-top: 15px;
            font-weight: bold;
            color: #6c298b;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2 class="message">Nueva Contraseña</h2>
        
        <p style="margin-bottom: 20px; font-size: 14px;">Ingresa tu nueva clave a continuación:</p>

        <input type="password" id="newPasswordInput" class="password-input" placeholder="Nueva contraseña">

        <p id="resetMessage"></p>
        
        <button id="updateBtn" class="confirm-button">Actualizar Contraseña</button>
        
        <a href="index.html" style="display: block; margin-top: 15px; font-size: 12px; color: #6c298b; text-decoration: none;">Volver al inicio</a>
    </div>

    <script type="module" src="scripts.js"></script>
</body>
</html>
